apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wndnjs0/my-k3s.git
    targetRevision: HEAD
    path: manifests/rustfs-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true