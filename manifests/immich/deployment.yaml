apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
      - name: immich-server
        image: ghcr.io/immich-app/immich-server:v2.7.5
        ports:
        - containerPort: 2283
          name: http
        envFrom:
        - secretRef:
            name: immich
        volumeMounts:
        - name: library
          mountPath: /usr/src/app/upload
        livenessProbe:
          httpGet:
            path: /api/server/ping
            port: 2283
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/server/ping
            port: 2283
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: library
        persistentVolumeClaim:
          claimName: immich-library
