apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-initialize
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-db
          image: mysql:8.0
          envFrom:
            - secretRef:
                name: mysql
          command:
            - sh
            - -c
            - |
              mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} \
                -e "CREATE DATABASE IF NOT EXISTS ghost;"
              mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} \
                -e "GRANT ALL PRIVILEGES ON ghost.* TO 'wndnjs'@'%'; FLUSH PRIVILEGES;"